<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鎏金熊形青铜镇 · 交互式数字展项</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            color: #ffecb3;
            padding: 10px 20px;
            border-radius: 30px;
            border-left: 4px solid #d4af37;
            z-index: 10;
            pointer-events: none;
            font-size: 14px;
        }
        #info h2 { margin: 0; font-size: 1.2rem; }
        #info p { margin: 5px 0 0; font-size: 0.8rem; }
        .info-panel {
            position: absolute;
            right: 20px;
            top: 80px;
            width: 280px;
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 18px;
            color: #f0f0f0;
            border-right: 4px solid #d4af37;
            transform: translateX(340px);
            transition: transform 0.4s ease;
            z-index: 20;
            font-size: 14px;
            line-height: 1.5;
            pointer-events: auto;
        }
        .info-panel.show { transform: translateX(0); }
        .info-panel h4 { margin: 0 0 8px; color: #d4af37; }
        .close-panel {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
        }
        .close-panel:hover { color: #fff; }
        #macro-tip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: #d4af37;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            white-space: nowrap;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .info-panel { width: 240px; padding: 14px; top: 70px; }
            #info { top: 12px; left: 12px; padding: 6px 14px; }
            #macro-tip { font-size: 12px; padding: 5px 16px; bottom: 20px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🐻 鎏金熊形青铜镇 · 西汉</h2>
        <p>高5.2cm | 1952年合肥出土 | 中国国家博物馆藏</p>
    </div>
    <div id="hotspot-panel" class="info-panel">
        <button class="close-panel" id="close-panel-btn">✕</button>
        <h4 id="panel-title">鎏金工艺</h4>
        <p id="panel-desc">通体鎏金，局部金层自然剥落。鎏金工艺是将金汞齐涂抹于青铜表面，加热使汞挥发，金层附着，体现了汉代高超的金属工艺水平。</p>
    </div>
    <div id="macro-tip">🔍 微距模式 · 鎏金层细节</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // 模型链接
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/YIZHI-9/1@main/stone%20animal%20sculpture%203d%20model.glb';

        // 热点数据（坐标可根据实际模型微调）
        const hotspotsData = [
            { name: '张口露齿', pos: [0.28, 0.68, 0.45], desc: '熊呈张口状，獠牙微露，表现熊的威猛神态。' },
            { name: '短耳竖起', pos: [0.32, 0.82, 0.38], desc: '双耳短小直立，增强警觉感，体现汉代工匠的精准捕捉。' },
            { name: '前肢上举', pos: [0.45, 0.48, 0.35], desc: '前肢自然上举，呈蹲踞状，憨态可掬，是汉代小型雕塑的典型风格。' },
            { name: '鎏金工艺', pos: [0.15, 0.55, 0.42], desc: '通体鎏金，局部金层剥落。鎏金工艺：金汞齐涂抹后加热，汞挥发，金层附着。' }
        ];

        // --- 场景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2.2, 1.4, 2.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // CSS2渲染器（关键：设置 pointer-events: none 让容器不拦截鼠标，但标签本身可点）
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // 让鼠标事件穿透容器
        document.body.appendChild(labelRenderer.domElement);

        // --- 轨道控制（必须正确配置）---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.5, 0);

        // --- 灯光 ---
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(2, 3, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0xccaa66, 0.6);
        backLight.position.set(-1.2, 1.5, -1.8);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(1.5, 1.2, 1.8);
        scene.add(fillLight);

        // 辅助地面阴影
        const shadowPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(3.5, 3.5),
            new THREE.ShadowMaterial({ opacity: 0.25, transparent: true, side: THREE.DoubleSide })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -0.45;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);

        // --- 热点面板逻辑 ---
        const panel = document.getElementById('hotspot-panel');
        const panelTitle = document.getElementById('panel-title');
        const panelDesc = document.getElementById('panel-desc');
        function showPanel(title, desc) {
            panelTitle.innerText = title;
            panelDesc.innerText = desc;
            panel.classList.add('show');
        }
        document.getElementById('close-panel-btn').onclick = () => panel.classList.remove('show');
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.hotspot-label') && !panel.contains(e.target)) {
                panel.classList.remove('show');
            }
        });

        // --- 创建可点击的热点标签（CSS2DObject）---
        function createLabel(name, pos, desc) {
            const div = document.createElement('div');
            div.textContent = name;
            div.className = 'hotspot-label';
            div.style.backgroundColor = 'rgba(201, 165, 59, 0.9)';
            div.style.color = '#2c2c2c';
            div.style.padding = '5px 14px';
            div.style.borderRadius = '40px';
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.cursor = 'pointer';
            div.style.border = '1px solid #ffd966';
            div.style.boxShadow = '0 2px 12px rgba(0,0,0,0.3)';
            div.style.transition = '0.2s';
            div.style.whiteSpace = 'nowrap';
            div.style.pointerEvents = 'auto';  // 标签自身可点击
            div.onmouseenter = () => { div.style.transform = 'scale(1.05)'; div.style.backgroundColor = '#e0b854'; };
            div.onmouseleave = () => { div.style.transform = 'scale(1)'; div.style.backgroundColor = 'rgba(201, 165, 59, 0.9)'; };
            div.onclick = (e) => { e.stopPropagation(); showPanel(name, desc); };
            const label = new CSS2DObject(div);
            label.position.set(pos[0], pos[1], pos[2]);
            return label;
        }

        // --- 加载模型 ---
        const loader = new GLTFLoader();
        let bearModel = null;

        loader.load(MODEL_URL, (gltf) => {
            bearModel = gltf.scene;
            bearModel.traverse(child => { if (child.isMesh) child.castShadow = true; });
            bearModel.scale.set(0.85, 0.85, 0.85);
            bearModel.position.set(0, -0.25, 0);
            scene.add(bearModel);

            // 添加热点标签（作为模型的子物体）
            hotspotsData.forEach(h => {
                const label = createLabel(h.name, h.pos, h.desc);
                bearModel.add(label);
            });

            // 自动设置 controls 目标
            const box = new THREE.Box3().setFromObject(bearModel);
            const center = box.getCenter(new THREE.Vector3());
            controls.target.copy(center);
            controls.update();

            const loadingDiv = document.getElementById('loading');
            if (loadingDiv) loadingDiv.remove();
        }, undefined, (err) => {
            console.error(err);
            const errDiv = document.createElement('div');
            errDiv.innerText = '⚠️ 模型加载失败，请检查链接';
            errDiv.style.position = 'absolute';
            errDiv.style.bottom = '20px';
            errDiv.style.left = '20px';
            errDiv.style.background = 'rgba(0,0,0,0.8)';
            errDiv.style.color = '#ff8888';
            errDiv.style.padding = '8px 16px';
            document.body.appendChild(errDiv);
        });

        // 加载提示
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'loading';
        loadingDiv.innerText = '加载模型中...';
        loadingDiv.style.position = 'absolute';
        loadingDiv.style.bottom = '20px';
        loadingDiv.style.right = '20px';
        loadingDiv.style.background = 'rgba(0,0,0,0.6)';
        loadingDiv.style.color = '#ccc';
        loadingDiv.style.padding = '4px 12px';
        loadingDiv.style.borderRadius = '20px';
        document.body.appendChild(loadingDiv);

        // --- 微距检测 ---
        const macroTip = document.getElementById('macro-tip');
        let macroActive = false;
        function checkMacro() {
            if (!bearModel) return;
            const dist = camera.position.distanceTo(bearModel.position);
            if (dist < 0.95 && !macroActive) {
                macroActive = true;
                macroTip.style.opacity = '1';
                showPanel('🔬 微距 · 鎏金工艺', hotspotsData[3].desc + ' 近距离观察可见金层剥落痕迹。');
                setTimeout(() => { if (macroActive) macroTip.style.opacity = '0'; }, 4000);
            } else if (dist >= 0.95 && macroActive) {
                macroActive = false;
                macroTip.style.opacity = '0';
            }
        }

        // --- 动画循环（必须调用 controls.update）---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();  // 关键：使旋转/缩放生效
            checkMacro();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
