<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D模型展示 - 可旋转缩放</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: sans-serif;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🐻 鎏金熊形青铜镇</h2>
        <p>🖱️ 鼠标拖拽旋转 | 右键平移 | 滚轮缩放</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 请确认这里的模型链接是否正确 ---
        // 这是您当前应该使用的、最稳定的链接
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/YIZHI-9/1@main/stone%20animal%20sculpture%203d%20model.glb';
        // ---------------------------------

        // 1. 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a); // 深色背景
        
        // 2. 创建相机
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 3);
        
        // 3. 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // 4. 【关键】轨道控制器，实现旋转、缩放、平移
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // 惯性效果
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // 5. 添加灯光，让模型更有立体感
        // 环境光
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // 主光源方向光
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);
        // 辅助背光
        const backLight = new THREE.PointLight(0x88aaff, 0.3);
        backLight.position.set(-0.5, 0.5, -1);
        scene.add(backLight);
        
        // 可选：添加一个辅助网格地面，方便观察旋转效果（不必须，但有助于确认相机运动）
        const gridHelper = new THREE.GridHelper(5, 20, 0x888888, 0x444444);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        // 6. 加载模型
        const loader = new GLTFLoader();
        let model = null;
        
        loader.load(MODEL_URL, (gltf) => {
            model = gltf.scene;
            // 调整模型大小和位置（根据实际效果微调）
            model.scale.set(0.8, 0.8, 0.8);
            model.position.set(0, -0.2, 0);
            scene.add(model);
            
            // 让相机对准模型的中心
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            controls.target.copy(center);
            controls.update();
            
            console.log('✅ 模型加载成功，现在可以拖拽旋转了');
            // 加载成功后，可以移除加载提示（如果有）
            const loadingDiv = document.getElementById('loading');
            if (loadingDiv) loadingDiv.style.display = 'none';
        }, undefined, (error) => {
            console.error('❌ 模型加载失败:', error);
            const errDiv = document.createElement('div');
            errDiv.id = 'error';
            errDiv.style.position = 'absolute';
            errDiv.style.bottom = '20px';
            errDiv.style.left = '20px';
            errDiv.style.background = 'rgba(0,0,0,0.8)';
            errDiv.style.color = '#ff8888';
            errDiv.style.padding = '8px 16px';
            errDiv.style.borderRadius = '8px';
            errDiv.style.fontSize = '12px';
            errDiv.innerText = '⚠️ 模型加载失败，请检查模型链接是否正确或网络是否通畅。';
            document.body.appendChild(errDiv);
        });
        
        // 添加一个简单的加载提示
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'loading';
        loadingDiv.style.position = 'absolute';
        loadingDiv.style.bottom = '20px';
        loadingDiv.style.right = '20px';
        loadingDiv.style.background = 'rgba(0,0,0,0.6)';
        loadingDiv.style.color = '#ccc';
        loadingDiv.style.padding = '4px 12px';
        loadingDiv.style.borderRadius = '20px';
        loadingDiv.style.fontSize = '12px';
        loadingDiv.innerText = '加载模型中...';
        document.body.appendChild(loadingDiv);
        
        // 7. 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 必须每帧调用，以应用交互
            renderer.render(scene, camera);
        }
        animate();
        
        // 8. 窗口大小自适应
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
