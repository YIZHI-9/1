<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鎏金熊形青铜镇 · 掀席子游戏 | 汉代客厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; overflow: hidden; color: #2c2c2c; }
        .game-tip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: #e6c87a;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            white-space: nowrap;
            z-index: 20;
            pointer-events: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }
        .score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #d4af37;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1rem;
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
        }
        /* 返回按钮样式，与跳转按钮风格一致，放在左上角避免与计分板重叠 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background: #d4af37;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            color: #2c2c2c;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .back-btn:hover {
            transform: scale(1.05);
            background: #e0b854;
        }
        @media (max-width: 600px) {
            .game-tip { font-size: 0.7rem; white-space: nowrap; bottom: 15px; }
            .score-board { font-size: 0.8rem; top: 12px; right: 12px; }
            .back-btn { top: 12px; left: 12px; padding: 6px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <button class="back-btn" id="backBtn">🏠 返回展厅</button>

    <div class="game-tip" id="gameTip">🖱️ 点击席角掀席 | 点击小熊累飞，停止后自动落回</div>
    <div class="score-board" id="scoreBoard">🐻 掀席次数: 0</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import gsap from 'gsap';

        const MODEL_URL = 'https://raw.githubusercontent.com/YIZHI-9/1/refs/heads/main/stone%20animal%20sculpture%203d%20model.glb';

        let liftCount = 0;
        let isAnimating = false;
        const scoreBoard = document.getElementById('scoreBoard');
        const gameTip = document.getElementById('gameTip');
        
        function updateScore() {
            scoreBoard.innerHTML = `🐻 掀席次数: ${liftCount}`;
            if (liftCount >= 8) {
                gameTip.innerHTML = '🎉 玩得开心！继续点击～ 🎉';
                setTimeout(() => gameTip.style.opacity = '0.5', 2000);
            }
        }

        // 场景初始化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f0e0);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2.2, 4);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setClearColor(0xf5f0e0, 1.0);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.2, 0);
        
        // 灯光
        const ambientLight = new THREE.AmbientLight(0x8c8c8c, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
        mainLight.position.set(2, 3, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0xd4b88c, 0.5);
        fillLight.position.set(1, 1.5, 1);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xaaccff, 0.4);
        backLight.position.set(-1, 1.2, -1.5);
        scene.add(backLight);
        
        // 阴影地面
        const shadowPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(5, 5),
            new THREE.ShadowMaterial({ opacity: 0.2, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -0.62;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);
        
        // 辅助网格
        const gridHelper = new THREE.GridHelper(6, 20, 0xc0b090, 0xe0d0b0);
        gridHelper.position.y = -0.58;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.15;
        scene.add(gridHelper);
        
        // 席子
        const matWidth = 2.8;
        const matDepth = 2.8;
        const matSegments = 48;
        const matGeometry = new THREE.PlaneGeometry(matWidth, matDepth, matSegments, matSegments);
        matGeometry.rotateX(-Math.PI / 2);
        const baseY = -0.58;
        const positions = matGeometry.attributes.position.array;
        const origY = new Array(positions.length / 3).fill(baseY);
        const origX = [];
        const origZ = [];
        for (let i = 0; i < positions.length; i += 3) {
            positions[i+1] = baseY;
            origX.push(positions[i]);
            origZ.push(positions[i+2]);
        }
        matGeometry.userData = { origY: origY.slice(), origX: origX.slice(), origZ: origZ.slice() };
        
        // 纹理
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#d8c8a8';
        ctx.fillRect(0, 0, 512, 512);
        ctx.strokeStyle = '#b08a5c';
        ctx.lineWidth = 6;
        for (let i = 0; i <= 20; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * 25);
            ctx.lineTo(512, i * 25);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(i * 25, 0);
            ctx.lineTo(i * 25, 512);
            ctx.stroke();
        }
        const matTexture = new THREE.CanvasTexture(canvas);
        matTexture.wrapS = THREE.RepeatWrapping;
        matTexture.wrapT = THREE.RepeatWrapping;
        matTexture.repeat.set(2, 2);
        
        const matMaterial = new THREE.MeshStandardMaterial({ map: matTexture, roughness: 0.7, metalness: 0.05, side: THREE.DoubleSide });
        const matMesh = new THREE.Mesh(matGeometry, matMaterial);
        matMesh.receiveShadow = true;
        scene.add(matMesh);
        
        const corners = [
            { x: -1.2, z: -1.2, index: 0 },
            { x: 1.2, z: -1.2, index: 1 },
            { x: -1.2, z: 1.2, index: 2 },
            { x: 1.2, z: 1.2, index: 3 }
        ];
        
        const vertexInfos = [];
        for (let i = 0; i < positions.length; i += 3) {
            vertexInfos.push({ idx: i/3, x: positions[i], z: positions[i+2] });
        }
        
        function liftMatCornerSmooth(cornerIndex, liftHeight = 0.22, radius = 0.95, inwardShift = 0.12) {
            return new Promise((resolve) => {
                const corner = corners[cornerIndex];
                const cx = corner.x;
                const cz = corner.z;
                const centerX = 0, centerZ = 0;
                const factors = [];
                const dirX = [];
                const dirZ = [];
                for (let v of vertexInfos) {
                    const dx = v.x - cx;
                    const dz = v.z - cz;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    let factor = 0;
                    if (dist < radius) {
                        const t = dist / radius;
                        factor = Math.cos(t * Math.PI / 2);
                        factor = factor * factor;
                    }
                    factors.push(factor);
                    let inDirX = centerX - v.x;
                    let inDirZ = centerZ - v.z;
                    const len = Math.hypot(inDirX, inDirZ);
                    if (len > 0.01) {
                        inDirX /= len;
                        inDirZ /= len;
                    }
                    dirX.push(inDirX);
                    dirZ.push(inDirZ);
                }
                const startY = origY.slice();
                const startX = origX.slice();
                const startZ = origZ.slice();
                const duration = 0.28;
                const startTime = performance.now();
                function step(now) {
                    const elapsed = now - startTime;
                    let t = Math.min(1, elapsed / (duration * 1000));
                    const ease = 1 - Math.pow(1 - t, 3);
                    for (let i = 0; i < vertexInfos.length; i++) {
                        const idx = vertexInfos[i].idx;
                        const posIdx = idx * 3;
                        const factor = factors[i];
                        const deltaY = factor * liftHeight * ease;
                        const deltaIn = factor * inwardShift * ease;
                        positions[posIdx + 1] = startY[i] + deltaY;
                        const newX = startX[i] + dirX[i] * deltaIn;
                        const newZ = startZ[i] + dirZ[i] * deltaIn;
                        positions[posIdx] = newX;
                        positions[posIdx + 2] = newZ;
                    }
                    matGeometry.attributes.position.needsUpdate = true;
                    if (t < 1) {
                        requestAnimationFrame(step);
                    } else {
                        setTimeout(() => {
                            const resetStart = performance.now();
                            function resetStep(now2) {
                                const elapsed2 = now2 - resetStart;
                                let t2 = Math.min(1, elapsed2 / (duration * 1000));
                                const ease2 = 1 - Math.pow(1 - t2, 3);
                                for (let i = 0; i < vertexInfos.length; i++) {
                                    const idx = vertexInfos[i].idx;
                                    const posIdx = idx * 3;
                                    const factor = factors[i];
                                    const deltaY = factor * liftHeight * (1 - ease2);
                                    const deltaIn = factor * inwardShift * (1 - ease2);
                                    positions[posIdx + 1] = startY[i] + deltaY;
                                    const newX = startX[i] + dirX[i] * deltaIn;
                                    const newZ = startZ[i] + dirZ[i] * deltaIn;
                                    positions[posIdx] = newX;
                                    positions[posIdx + 2] = newZ;
                                }
                                matGeometry.attributes.position.needsUpdate = true;
                                if (t2 < 1) requestAnimationFrame(resetStep);
                                else resolve();
                            }
                            requestAnimationFrame(resetStep);
                        }, 220);
                    }
                }
                requestAnimationFrame(step);
            });
        }
        
        // 席角点击区域
        const clickZones = [];
        corners.forEach(corner => {
            const zone = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 0.1, 0.7),
                new THREE.MeshStandardMaterial({ transparent: true, opacity: 0 })
            );
            zone.position.set(corner.x, baseY + 0.05, corner.z);
            zone.userData = { cornerIndex: corner.index };
            scene.add(zone);
            clickZones.push(zone);
        });
        
        // 加载熊模型
        const loader = new GLTFLoader();
        let originalModel = null;
        let cornerBears = [];
        let bearStartPositions = [];
        let resetTimers = [null, null, null, null];
        
        function placeBears(model) {
            const bearPositions = [
                { x: -1.18, z: -1.18, rot: 0 },
                { x: 1.18, z: -1.18, rot: 0 },
                { x: -1.18, z: 1.18, rot: 0 },
                { x: 1.18, z: 1.18, rot: 0 }
            ];
            const bearY = -0.26;
            for (let i = 0; i < 4; i++) {
                const clone = model.clone();
                clone.scale.set(0.45, 0.45, 0.45);
                clone.position.set(bearPositions[i].x, bearY, bearPositions[i].z);
                clone.rotation.y = bearPositions[i].rot;
                clone.traverse(child => { if (child.isMesh) child.castShadow = true; });
                scene.add(clone);
                cornerBears.push(clone);
                bearStartPositions.push(clone.position.clone());
            }
        }
        
        let bearClickZones = [];
        function createBearClickZones() {
            cornerBears.forEach((bear, idx) => {
                const zone = new THREE.Mesh(
                    new THREE.BoxGeometry(0.9, 0.9, 0.9),
                    new THREE.MeshStandardMaterial({ transparent: true, opacity: 0 })
                );
                zone.position.copy(bear.position);
                zone.userData = { bearIndex: idx };
                scene.add(zone);
                bearClickZones.push(zone);
            });
        }
        
        function updateBearZones() {
            for (let i = 0; i < cornerBears.length; i++) {
                if (bearClickZones[i]) bearClickZones[i].position.copy(cornerBears[i].position);
            }
        }
        
        function clearResetTimer(index) {
            if (resetTimers[index]) {
                clearTimeout(resetTimers[index]);
                resetTimers[index] = null;
            }
        }
        
        function resetBearToGround(index, immediate = false) {
            const bear = cornerBears[index];
            const targetPos = bearStartPositions[index];
            const targetRot = 0;
            gsap.killTweensOf(bear.position);
            gsap.killTweensOf(bear.rotation);
            const duration = immediate ? 0.2 : 0.4;
            gsap.to(bear.position, { y: targetPos.y, duration: duration, ease: "bounce.out" });
            gsap.to(bear.rotation, { y: targetRot, duration: duration, ease: "power2.out" });
        }
        
        function flyBearUp(bear, index) {
            clearResetTimer(index);
            gsap.killTweensOf(bear.position);
            gsap.killTweensOf(bear.rotation);
            const stepHeight = 0.5;
            const stepRot = Math.PI * 2;
            gsap.to(bear.position, { y: bear.position.y + stepHeight, duration: 0.35, ease: "power2.out" });
            gsap.to(bear.rotation, { y: bear.rotation.y + stepRot, duration: 0.35, ease: "power2.out" });
            resetTimers[index] = setTimeout(() => {
                resetBearToGround(index, false);
                resetTimers[index] = null;
                gameTip.style.opacity = '1';
                gameTip.innerHTML = `🐻 小熊落回地面，再来点我飞高高～`;
                setTimeout(() => {
                    if (liftCount < 8) gameTip.innerHTML = '🖱️ 点击席角掀席 | 点击小熊累飞，停止后自动落回';
                    else gameTip.innerHTML = '🎉 玩得开心！继续点击～ 🎉';
                }, 1500);
            }, 1500);
            gameTip.style.opacity = '1';
            gameTip.innerHTML = `🐻 小熊上升！停止1.5秒后自动落回 🚀`;
            setTimeout(() => {
                if (liftCount < 8) gameTip.innerHTML = '🖱️ 点击席角掀席 | 点击小熊累飞，停止后自动落回';
                else gameTip.innerHTML = '🎉 玩得开心！继续点击～ 🎉';
            }, 1500);
        }
        
        async function liftCorner(index) {
            if (isAnimating) return;
            if (!cornerBears[index]) return;
            isAnimating = true;
            liftCount++;
            updateScore();
            clearResetTimer(index);
            const liftPromise = liftMatCornerSmooth(index, 0.22, 0.95, 0.12);
            const bear = cornerBears[index];
            const originalGroundY = bearStartPositions[index].y;
            const currentY = bear.position.y;
            const startRot = bear.rotation.y;
            gsap.killTweensOf(bear.position);
            gsap.killTweensOf(bear.rotation);
            const extraHeight = 0.6;
            const peakY = currentY + extraHeight;
            const targetRot = startRot + Math.PI * 1.5;
            const tl = gsap.timeline();
            tl.to(bear.position, { y: peakY, duration: 0.3, ease: "back.out(1.2)" }, 0);
            tl.to(bear.rotation, { y: targetRot, duration: 0.3, ease: "power2.out" }, 0);
            tl.to(bear.position, { y: originalGroundY, duration: 0.4, ease: "bounce.out", delay: 0.15 });
            tl.to(bear.rotation, { y: 0, duration: 0.4, ease: "back.inOut" }, "-=0.2");
            await Promise.all([liftPromise, tl.play()]);
            gameTip.style.opacity = '1';
            gameTip.innerHTML = '✨ 席子掀开啦！熊落回地面 ✨';
            setTimeout(() => {
                if (liftCount < 8) gameTip.innerHTML = '🖱️ 点击席角掀席 | 点击小熊累飞，停止后自动落回';
                else gameTip.innerHTML = '🎉 玩得开心！继续点击～ 🎉';
            }, 1500);
            isAnimating = false;
        }
        
        let loadAttempts = 0;
        function loadModel() {
            loader.load(MODEL_URL, (gltf) => {
                originalModel = gltf.scene;
                originalModel.scale.set(0.85, 0.85, 0.85);
                placeBears(originalModel);
                createBearClickZones();
                console.log('✅ 模型加载成功');
                const loadingDiv = document.getElementById('loadingDiv');
                if (loadingDiv) loadingDiv.remove();
                function updateZonesLoop() { updateBearZones(); requestAnimationFrame(updateZonesLoop); }
                updateZonesLoop();
            }, undefined, (error) => {
                console.error('模型加载失败', error);
                loadAttempts++;
                if (loadAttempts < 3) setTimeout(loadModel, 2000);
                else {
                    const tip = document.createElement('div');
                    tip.innerText = '⚠️ 模型加载失败，请检查网络';
                    tip.style.position = 'absolute';
                    tip.style.bottom = '50%';
                    tip.style.left = '50%';
                    tip.style.background = 'black';
                    tip.style.color = 'red';
                    tip.style.padding = '10px';
                    document.body.appendChild(tip);
                }
            });
        }
        loadModel();
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const cornerIntersects = raycaster.intersectObjects(clickZones);
            if (cornerIntersects.length > 0) {
                const idx = cornerIntersects[0].object.userData.cornerIndex;
                if (idx !== undefined) { liftCorner(idx); return; }
            }
            const bearIntersects = raycaster.intersectObjects(bearClickZones);
            if (bearIntersects.length > 0) {
                const bearIdx = bearIntersects[0].object.userData.bearIndex;
                if (bearIdx !== undefined && cornerBears[bearIdx]) flyBearUp(cornerBears[bearIdx], bearIdx);
            }
        });
        
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'loadingDiv';
        loadingDiv.innerText = '加载中...';
        loadingDiv.style.position = 'absolute';
        loadingDiv.style.bottom = '20px';
        loadingDiv.style.left = '20px';
        loadingDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        loadingDiv.style.color = '#ddd';
        loadingDiv.style.padding = '4px 12px';
        loadingDiv.style.borderRadius = '20px';
        document.body.appendChild(loadingDiv);
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 返回按钮逻辑
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'index.html'; // 返回展示页面，请确保文件名正确
        });
    </script>
</body>
</html>
